name: TP2 Infrastructure Automation

on:
  push:
    branches:
      - main
    paths:
      - "TP2/**"
      - "TP1/**"
      - ".github/workflows/tp2-automation.yml"
  pull_request:
    paths:
      - "TP2/**"
      - "TP1/**"
      - ".github/workflows/tp2-automation.yml"

permissions:
  contents: read

concurrency:
  group: tp2-automation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  runner-proof:
    name: Runner proof
    runs-on: [self-hosted, linux, x64, tp2]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prove custom runner execution
        run: |
          echo "runner_name=${RUNNER_NAME}"
          echo "runner_os=${RUNNER_OS}"
          echo "runner_arch=${RUNNER_ARCH}"
          echo "hostname=$(hostname)"
          echo "workspace=${GITHUB_WORKSPACE}"
          echo "repository=${GITHUB_REPOSITORY}"

  terraform-inventory:
    name: Terraform and Jinja2 inventory
    runs-on: [self-hosted, linux, x64, tp2]
    needs:
      - runner-proof
    defaults:
      run:
        working-directory: TP2
    env:
      TF_VAR_linux_host: ${{ secrets.TP2_LINUX_HOST }}
      TF_VAR_linux_user: ${{ secrets.TP2_LINUX_USER }}
      TF_VAR_linux_ssh_port: ${{ secrets.TP2_LINUX_SSH_PORT || 22 }}
      TF_VAR_linux_ssh_private_key_file: /workspace/TP2/generated/linux_id_rsa
      TF_VAR_windows_host: ${{ secrets.TP2_WINDOWS_HOST }}
      TF_VAR_windows_user: ${{ secrets.TP2_WINDOWS_USER }}
      TF_VAR_windows_winrm_port: ${{ secrets.TP2_WINDOWS_WINRM_PORT || 5986 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare generated directory
        run: mkdir -p generated

      - name: Write Linux SSH key
        run: |
          umask 077
          printf '%s\n' '${{ secrets.TP2_LINUX_SSH_PRIVATE_KEY }}' > generated/linux_id_rsa
          chmod 600 generated/linux_id_rsa

      - name: Terraform fmt
        run: terraform -chdir=terraform fmt -check

      - name: Terraform init
        run: terraform -chdir=terraform init

      - name: Terraform validate
        run: terraform -chdir=terraform validate

      - name: Terraform plan
        run: terraform -chdir=terraform plan -out=tfplan

      - name: Terraform apply metadata plan
        run: terraform -chdir=terraform apply -auto-approve tfplan

      - name: Export Terraform target metadata
        run: terraform -chdir=terraform output -json target_metadata > generated/targets.json

      - name: Build Ansible controller
        run: docker compose build ansible-controller

      - name: Render Ansible inventory from Jinja2
        run: >
          docker compose run --rm ansible-controller
          python3 TP2/scripts/render_inventory.py
          TP2/generated/targets.json
          TP2/templates/inventory.yml.j2
          TP2/generated/inventory.yml

      - name: Show generated inventory proof
        run: |
          sed -E 's/(ansible_password:).*/\1 REDACTED/' generated/inventory.yml

      - name: Upload generated inventory artifact
        uses: actions/upload-artifact@v7
        with:
          name: tp2-generated-inventory
          path: |
            TP2/generated/targets.json
            TP2/generated/inventory.yml

  ansible-automation:
    name: Ansible facts timezone and TP1 deploy
    runs-on: [self-hosted, linux, x64, tp2]
    needs:
      - terraform-inventory
    defaults:
      run:
        working-directory: TP2
    env:
      TP2_WINDOWS_PASSWORD: ${{ secrets.TP2_WINDOWS_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download generated inventory
        uses: actions/download-artifact@v7
        with:
          name: tp2-generated-inventory
          path: TP2/generated

      - name: Restore Linux SSH key
        run: |
          umask 077
          printf '%s\n' '${{ secrets.TP2_LINUX_SSH_PRIVATE_KEY }}' > generated/linux_id_rsa
          chmod 600 generated/linux_id_rsa

      - name: Build Ansible controller
        run: docker compose build ansible-controller

      - name: Ansible syntax check
        run: >
          docker compose run --rm ansible-controller
          ansible-playbook
          -i TP2/generated/inventory.yml
          TP2/ansible/playbooks/site.yml
          --syntax-check

      - name: Run Ansible automation
        run: >
          docker compose run --rm ansible-controller
          ansible-playbook
          -i TP2/generated/inventory.yml
          TP2/ansible/playbooks/site.yml
