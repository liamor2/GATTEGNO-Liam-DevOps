name: TP2 Infrastructure Automation

on:
  push:
    branches:
      - main
    paths:
      - "TP2/**"
      - "TP1/**"
      - ".github/workflows/tp2-automation.yml"
  pull_request:
    paths:
      - "TP2/**"
      - "TP1/**"
      - ".github/workflows/tp2-automation.yml"

permissions:
  contents: read

concurrency:
  group: tp2-automation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  runner-proof:
    name: Runner proof
    runs-on: [self-hosted, linux, x64]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prove custom runner execution
        run: |
          echo "runner_name=${RUNNER_NAME}"
          echo "runner_os=${RUNNER_OS}"
          echo "runner_arch=${RUNNER_ARCH}"
          echo "hostname=$(hostname)"
          echo "workspace=${GITHUB_WORKSPACE}"
          echo "repository=${GITHUB_REPOSITORY}"

  terraform-inventory:
    name: Terraform and Jinja2 inventory
    runs-on: [self-hosted, linux, x64]
    needs:
      - runner-proof
    defaults:
      run:
        working-directory: TP2
    env:
      TP2_TARGETS_JSON: ${{ secrets.TP2_TARGETS_JSON }}
      TP2_LINUX_SSH_KEYS_JSON: ${{ secrets.TP2_LINUX_SSH_KEYS_JSON }}
      TP2_WINDOWS_PASSWORDS_JSON: ${{ secrets.TP2_WINDOWS_PASSWORDS_JSON }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare generated directory
        run: mkdir -p generated/keys generated/traefik

      - name: Write target configuration
        run: |
          if [ -z "${TP2_TARGETS_JSON}" ]; then
            echo "TP2_TARGETS_JSON secret is required." >&2
            exit 1
          fi
          printf '%s\n' "${TP2_TARGETS_JSON}" > generated/targets.auto.tfvars.json

      - name: Write Linux SSH keys
        run: python3 scripts/write_linux_keys.py generated/keys

      - name: Terraform fmt
        run: terraform -chdir=terraform fmt -check

      - name: Terraform init
        run: terraform -chdir=terraform init

      - name: Terraform validate
        run: terraform -chdir=terraform validate

      - name: Terraform plan
        run: terraform -chdir=terraform plan -var-file=../generated/targets.auto.tfvars.json -out=tfplan

      - name: Terraform apply metadata plan
        run: terraform -chdir=terraform apply -auto-approve tfplan

      - name: Export Terraform target metadata
        run: terraform -chdir=terraform output -json target_metadata > generated/targets.json

      - name: Render Traefik compose environment
        run: >
          python3 scripts/write_traefik_env.py
          generated/targets.auto.tfvars.json
          generated/traefik/traefik.env

      - name: Build Ansible controller
        run: docker compose build ansible-controller

      - name: Render Ansible inventory from Jinja2
        run: >
          docker compose run --rm ansible-controller
          python3 TP2/scripts/render_inventory.py
          TP2/generated/targets.json
          TP2/templates/inventory.yml.j2
          TP2/generated/inventory.yml

      - name: Render Traefik dynamic configuration from Jinja2
        run: >
          docker compose run --rm ansible-controller
          python3 TP2/scripts/render_inventory.py
          TP2/generated/targets.json
          TP2/templates/traefik-dynamic.yml.j2
          TP2/generated/traefik/dynamic.yml

      - name: Show generated inventory proof
        run: |
          sed -E 's/(ansible_password:).*/\1 REDACTED/' generated/inventory.yml

      - name: Show generated Traefik proof
        run: sed -n '1,220p' generated/traefik/dynamic.yml

      - name: Upload generated inventory artifact
        uses: actions/upload-artifact@v7
        with:
          name: tp2-generated-inventory
          path: |
            TP2/generated/targets.json
            TP2/generated/inventory.yml
            TP2/generated/targets.auto.tfvars.json
            TP2/generated/traefik/dynamic.yml
            TP2/generated/traefik/traefik.env

  ansible-automation:
    name: Ansible facts timezone and TP1 deploy
    runs-on: [self-hosted, linux, x64]
    needs:
      - terraform-inventory
    defaults:
      run:
        working-directory: TP2
    env:
      TP2_LINUX_SSH_KEYS_JSON: ${{ secrets.TP2_LINUX_SSH_KEYS_JSON }}
      TP2_WINDOWS_PASSWORDS_JSON: ${{ secrets.TP2_WINDOWS_PASSWORDS_JSON }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download generated inventory
        uses: actions/download-artifact@v7
        with:
          name: tp2-generated-inventory
          path: TP2/generated

      - name: Restore Linux SSH keys
        run: python3 scripts/write_linux_keys.py generated/keys

      - name: Build Ansible controller
        run: docker compose build ansible-controller

      - name: Ansible syntax check
        run: >
          docker compose run --rm ansible-controller
          ansible-playbook
          -i TP2/generated/inventory.yml
          TP2/ansible/playbooks/site.yml
          --syntax-check

      - name: Run Ansible automation
        run: >
          docker compose run --rm ansible-controller
          ansible-playbook
          -i TP2/generated/inventory.yml
          TP2/ansible/playbooks/site.yml
