name: TP1 CI-CD

on:
  push:
    branches:
      - main
    paths:
      - "TP1/**"
  pull_request:
    paths:
      - "TP1/**"

permissions:
  contents: read

concurrency:
  group: tp1-ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-quality-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: TP1/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 26.2.0

      - name: Install dependencies
        run: npm install

      - name: Biome check
        run: npm run check

      - name: Unit tests
        run: npm run test

  backend-quality-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: TP1/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Run tests
        run: mvn -B test

      - name: Checkstyle
        run: mvn -B checkstyle:check

      - name: SpotBugs
        run: mvn -B spotbugs:check

  terraform-plan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: TP1/infra/terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.15.4

      - name: Terraform fmt
        run: terraform fmt -check

      - name: Terraform init
        run: terraform init

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan (no deploy)
        run: terraform plan -var="deploy_enabled=false" -var="deploy_version=${GITHUB_SHA}" -out=tfplan

      - name: Upload Terraform plan
        uses: actions/upload-artifact@v7
        with:
          name: tfplan
          path: TP1/infra/terraform/tfplan

  e2e-playwright:
    runs-on: ubuntu-latest
    needs:
      - frontend-quality-tests
      - backend-quality-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 26.2.0

      - name: Install frontend dependencies
        working-directory: TP1/frontend
        run: npm install

      - name: Install Playwright browsers
        working-directory: TP1/frontend
        run: npx playwright install --with-deps chromium

      - name: Start stack
        working-directory: TP1
        run: docker compose up -d --build

      - name: Wait for frontend
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:5173 >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Wait for backend
        run: |
          for i in {1..30}; do
            if curl -fsS -X POST http://127.0.0.1:8080/api/click >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Run Playwright e2e
        working-directory: TP1/frontend
        run: npm run e2e

      - name: Stop stack
        if: always()
        working-directory: TP1
        run: docker compose down -v

  terraform-apply-auto:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, linux, x64]
    needs:
      - terraform-plan
      - e2e-playwright
    defaults:
      run:
        working-directory: TP1/infra/terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.15.4

      - name: Terraform init
        run: terraform init

      - name: Terraform apply (auto deploy on self-hosted runner)
        env:
          TF_VAR_deploy_enabled: "true"
          TF_VAR_deploy_mode: "self_hosted_local"
          TF_VAR_deploy_version: ${{ github.sha }}
          TF_VAR_repo_root: ${{ github.workspace }}/TP1
          TF_VAR_app_env_content: ${{ secrets.DEPLOY_APP_ENV }}
        run: terraform apply -auto-approve
