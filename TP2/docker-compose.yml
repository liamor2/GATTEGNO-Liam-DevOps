services:
  ansible-controller:
    build:
      context: ./controller
    container_name: tp2-ansible-controller
    environment:
      ANSIBLE_HOST_KEY_CHECKING: "false"
      TP2_WINDOWS_PASSWORDS_JSON: ${TP2_WINDOWS_PASSWORDS_JSON:-{}}
    volumes:
      - ..:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /workspace

  traefik:
    image: traefik:v3.7.0
    container_name: tp2-traefik
    command:
      - "--entrypoints.web.address=:80"
      - "--providers.file.filename=/etc/traefik/dynamic/dynamic.yml"
      - "--providers.file.watch=true"
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--accesslog=true"
    ports:
      - "${TP2_TRAEFIK_HTTP_PORT:-80}:80"
      - "${TP2_TRAEFIK_DASHBOARD_PORT:-8088}:8080"
    volumes:
      - type: bind
        source: ./generated/traefik/dynamic.yml
        target: /etc/traefik/dynamic/dynamic.yml
        read_only: true
        bind:
          create_host_path: false
    restart: unless-stopped
