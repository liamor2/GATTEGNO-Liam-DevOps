---
- name: Configure Traefik load balancer on runner host
  hosts: controller
  gather_facts: false
  tasks:
    - name: Ensure generated Traefik directory exists
      ansible.builtin.file:
        path: "{{ tp2_project_root }}/TP2/generated/traefik"
        state: directory
        mode: "0755"
      when: tp2_load_balancer_enabled

    - name: Check existing Traefik dynamic path type
      ansible.builtin.stat:
        path: "{{ tp2_project_root }}/TP2/generated/traefik/dynamic.yml"
      register: tp2_traefik_dynamic_path
      when: tp2_load_balancer_enabled

    - name: Remove invalid Traefik dynamic directory
      ansible.builtin.file:
        path: "{{ tp2_project_root }}/TP2/generated/traefik/dynamic.yml"
        state: absent
      when:
        - tp2_load_balancer_enabled
        - tp2_traefik_dynamic_path.stat.exists
        - tp2_traefik_dynamic_path.stat.isdir

    - name: Render Traefik dynamic configuration
      ansible.builtin.command: >
        python3 TP2/scripts/render_inventory.py
        TP2/generated/targets.json
        TP2/templates/traefik-dynamic.yml.j2
        TP2/generated/traefik/dynamic.yml
      args:
        chdir: "{{ tp2_project_root }}"
      changed_when: true
      when: tp2_load_balancer_enabled

    - name: Render Traefik compose environment
      ansible.builtin.command: >
        python3 scripts/write_traefik_env.py
        generated/targets.auto.tfvars.json
        generated/traefik/traefik.env
      args:
        chdir: "{{ tp2_project_root }}/TP2"
      changed_when: true
      when: tp2_load_balancer_enabled

    - name: Start Traefik load balancer
      ansible.builtin.command: >
        docker compose
        --env-file generated/traefik/traefik.env
        up -d traefik
      args:
        chdir: "{{ tp2_project_root }}/TP2"
      changed_when: true
      when: tp2_load_balancer_enabled

- name: Validate Traefik load-balanced routes
  hosts: controller
  gather_facts: false
  tasks:
    - name: Validate Traefik frontend route
      ansible.builtin.uri:
        url: "http://{{ tp2_load_balancer_host }}:{{ tp2_load_balancer_http_port }}/"
        headers:
          Host: "{{ tp2_load_balancer_hostnames.frontend }}"
        status_code: 200
      register: traefik_frontend_probe
      until: traefik_frontend_probe.status == 200
      retries: 30
      delay: 5
      when: tp2_load_balancer_enabled

    - name: Validate Traefik backend route
      ansible.builtin.uri:
        url: "http://{{ tp2_load_balancer_host }}:{{ tp2_load_balancer_http_port }}/api/click"
        method: POST
        headers:
          Host: "{{ tp2_load_balancer_hostnames.backend }}"
        status_code: 200
        return_content: true
      register: traefik_backend_probe
      when: tp2_load_balancer_enabled

    - name: Validate Traefik Prometheus route
      ansible.builtin.uri:
        url: "http://{{ tp2_load_balancer_host }}:{{ tp2_load_balancer_http_port }}/-/ready"
        headers:
          Host: "{{ tp2_load_balancer_hostnames.prometheus }}"
        status_code: 200
      register: traefik_prometheus_probe
      until: traefik_prometheus_probe.status == 200
      retries: 30
      delay: 5
      when: tp2_load_balancer_enabled

    - name: Validate Traefik Grafana route
      ansible.builtin.uri:
        url: "http://{{ tp2_load_balancer_host }}:{{ tp2_load_balancer_http_port }}/api/health"
        headers:
          Host: "{{ tp2_load_balancer_hostnames.grafana }}"
        status_code: 200
      register: traefik_grafana_probe
      until: traefik_grafana_probe.status == 200
      retries: 30
      delay: 5
      when: tp2_load_balancer_enabled

    - name: Show Traefik validation proof
      ansible.builtin.debug:
        msg:
          frontend: "{{ tp2_load_balancer_urls.frontend }}"
          backend_response: "{{ traefik_backend_probe.json | default({}) }}"
          prometheus: "{{ tp2_load_balancer_urls.prometheus }}"
          grafana: "{{ tp2_load_balancer_urls.grafana }}"
      when: tp2_load_balancer_enabled
