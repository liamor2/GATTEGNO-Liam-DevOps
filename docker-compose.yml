services:
  db:
    image: postgres:18.4-alpine3.23
    container_name: clicktracker-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-clickdb}
      POSTGRES_USER: ${POSTGRES_USER:-clickuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clickpass}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
    container_name: clicktracker-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-clickdb}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-clickuser}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-clickpass}
      APP_CORS_ALLOWED_ORIGIN_PATTERNS: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:-http://localhost:*,http://127.0.0.1:*}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
    container_name: clicktracker-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
